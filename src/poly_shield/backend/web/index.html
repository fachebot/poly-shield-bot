<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Poly Shield Control Room</title>
    <link rel="stylesheet" href="/assets/styles.css" />
</head>

<body>
    <dialog id="initialLoadingDialog" class="loading-dialog" aria-labelledby="initialLoadingTitle"
        aria-describedby="initialLoadingCopy">
        <div class="loading-dialog-card">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p class="loading-kicker">首次同步</p>
            <h2 id="initialLoadingTitle">正在同步首页数据</h2>
            <p id="initialLoadingCopy" class="loading-copy">先拉取仓位、任务和时间线，完成后会自动进入控制台。</p>
        </div>
    </dialog>
    <div class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Poly Shield</p>
                <h1>Control Room</h1>
                <p class="subtitle">真实仓位优先的单账户控制台。先看仓位，再看任务、规则和执行时间线。</p>
            </div>
            <div class="hero-actions">
                <button id="refreshButton" class="button button-primary">刷新</button>
                <p id="lastSyncText" class="muted">等待首次同步</p>
            </div>
        </header>

        <section id="healthPanel" class="health-strip"></section>
        <section id="banner" class="banner hidden"></section>

        <main class="dashboard-grid">
            <section class="panel panel-list">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">首页</p>
                        <h2 id="positionPanelTitle">仓位列表</h2>
                    </div>
                    <span id="positionCount" class="count-chip">0</span>
                </div>
                <div class="list-tabs">
                    <button class="tab-btn active" data-tab="active">仓位列表</button>
                    <button class="tab-btn" data-tab="archived">
                        归档仓位 <span id="archivedCount" class="count-chip">0</span>
                    </button>
                </div>
                <div id="positionList" class="position-list"></div>
                <div id="archivedList" class="position-list hidden"></div>
            </section>

            <section class="panel panel-detail">
                <div id="detailEmpty" class="empty-state">
                    <p class="eyebrow">Detail</p>
                    <h2>选择一个仓位</h2>
                    <p>查看当前任务、规则配置、历史任务和执行时间线。</p>
                </div>

                <div id="detailView" class="detail-view hidden">
                    <section class="detail-section summary-block">
                        <div>
                            <p class="panel-kicker">仓位摘要</p>
                            <h2 id="detailTitle">-</h2>
                            <p id="detailMeta" class="muted"></p>
                        </div>
                        <div class="summary-grid">
                            <div class="metric-card">
                                <span>仓位</span>
                                <strong id="detailSize">-</strong>
                            </div>
                            <div class="metric-card">
                                <span>均价</span>
                                <strong id="detailAverageCost">-</strong>
                            </div>
                            <div class="metric-card">
                                <span>现价</span>
                                <strong id="detailCurrentPrice">-</strong>
                            </div>
                            <div class="metric-card">
                                <span>PnL</span>
                                <strong id="detailPnL">-</strong>
                            </div>
                        </div>
                    </section>

                    <section class="detail-section two-column">
                        <div class="card-block">
                            <div class="block-header">
                                <div>
                                    <p class="panel-kicker">当前任务</p>
                                    <h3>止盈止损配置</h3>
                                </div>
                                <div id="taskActions" class="inline-actions"></div>
                            </div>
                            <div id="activeTaskContent" class="task-card"></div>
                        </div>

                        <div class="card-block">
                            <div class="block-header">
                                <div>
                                    <p id="taskFormKicker" class="panel-kicker">创建任务</p>
                                    <h3 id="taskFormTitle">快速新增一套规则</h3>
                                </div>
                            </div>
                            <div id="taskFormStatePanel" class="runtime-state-panel hidden"></div>
                            <form id="createTaskForm" class="task-form">
                                <div class="form-grid">
                                    <label>
                                        <span>仓位覆盖</span>
                                        <input name="position_size" type="number" step="0.0001" placeholder="默认取当前仓位" />
                                    </label>
                                    <label>
                                        <span>均价覆盖 (c)</span>
                                        <input name="average_cost" type="number" step="0.1" placeholder="默认取当前均价" />
                                    </label>
                                    <label>
                                        <span>止盈价 (c)</span>
                                        <input name="take_profit" type="number" step="0.1" placeholder="例如 10" />
                                    </label>
                                    <label>
                                        <span>止盈卖出股数</span>
                                        <input name="take_profit_size" type="number" step="0.0001"
                                            placeholder="例如 25" />
                                    </label>
                                    <label>
                                        <span>止损价 (c)</span>
                                        <input name="price_stop" type="number" step="0.1" placeholder="例如 6" />
                                    </label>
                                    <label>
                                        <span>止损卖出股数</span>
                                        <input name="price_stop_size" type="number" step="0.0001"
                                            placeholder="例如 30" />
                                    </label>
                                    <label>
                                        <span>保本止损卖出股数</span>
                                        <input name="breakeven_stop_size" type="number" step="0.0001"
                                            placeholder="例如 20" />
                                    </label>
                                    <label>
                                        <span>Trailing 回撤 (%)</span>
                                        <input name="trailing_drawdown" type="number" step="0.1"
                                            placeholder="例如 8" />
                                    </label>
                                    <label>
                                        <span>Trailing 卖出股数</span>
                                        <input name="trailing_sell_size" type="number" step="0.0001"
                                            placeholder="例如 25" />
                                    </label>
                                    <label>
                                        <span>Trailing 激活价 (c)</span>
                                        <input name="trailing_activation_price" type="number" step="0.1"
                                            placeholder="例如 65" />
                                    </label>
                                    <label>
                                        <span>滑点 bps</span>
                                        <input name="slippage_bps" type="number" step="1" value="50" />
                                    </label>
                                    <label class="checkbox-field">
                                        <span>只读演练</span>
                                        <input name="dry_run" type="checkbox" checked />
                                    </label>
                                </div>
                                <div class="form-actions">
                                    <button id="taskFormSubmitButton" type="submit" class="button button-primary">创建任务</button>
                                    <button id="cancelEditButton" type="button" class="button button-secondary hidden">取消编辑</button>
                                    <p id="formHint" class="muted">若当前 token 已有 active task，请先暂停或删除。</p>
                                </div>
                            </form>
                        </div>
                    </section>

                    <section class="detail-section two-column">
                        <div class="card-block">
                            <div class="block-header">
                                <div>
                                    <p class="panel-kicker">历史任务</p>
                                    <h3>同一仓位的任务状态</h3>
                                </div>
                            </div>
                            <div class="history-toolbar">
                                <input id="historyFilterInput" class="history-filter-input" type="search" placeholder="按 task id / 规则名 / 状态筛选" />
                                <button id="historyFilterResetButton" type="button" class="button button-secondary">清空</button>
                            </div>
                            <div id="taskHistory" class="history-list"></div>
                        </div>

                        <div class="card-block timeline-block">
                            <div class="block-header">
                                <div>
                                    <p class="panel-kicker">执行结果</p>
                                    <h3>时间线</h3>
                                </div>
                            </div>
                            <div id="timelineToolbar" class="timeline-toolbar hidden"></div>
                            <div id="recordTimeline" class="timeline"></div>
                        </div>
                    </section>
                </div>
            </section>
        </main>
    </div>

    <template id="positionItemTemplate">
        <button class="position-item" type="button">
            <div class="position-main">
                <div>
                    <strong class="position-title"></strong>
                    <p class="position-subtitle"></p>
                </div>
                <span class="status-pill"></span>
            </div>
            <div class="position-metrics">
                <span class="position-size"></span>
                <span class="position-price"></span>
            </div>
        </button>
    </template>

    <script type="module" src="/assets/app.js"></script>
</body>

</html>
