{% extends "base.html" %}

{% block content %}
<div class="page-wrap">

    <!-- TOP SUMMARY ROW: Overview + Health -->
    <div style="display:grid;grid-template-columns:1fr 360px;gap:16px;">

        <!-- Overview Stats -->
        <div class="card-panel">
            <div class="panel-header">
                <span class="panel-title">总览</span>
                <span style="font-size:11px;color:var(--text-muted)" id="overview-refresh-hint">—</span>
            </div>
            <div id="overview-body" hx-get="/ui/panels/overview" hx-trigger="load, every 10s" hx-swap="innerHTML">
                <div class="overview-body">
                    <div class="stat-item"><span class="stat-label">加载中…</span></div>
                </div>
            </div>
        </div>

        <!-- Health -->
        <div class="card-panel">
            <div class="panel-header">
                <span class="panel-title">健康状态</span>
                <span id="health-chip" hx-get="/ui/panels/health_chip" hx-trigger="load, every 5s"
                    hx-swap="outerHTML"></span>
            </div>
            <div id="health-body" hx-get="/ui/panels/health" hx-trigger="load, every 5s" hx-swap="innerHTML">
                <div class="health-body">
                    <div class="health-row"><span class="h-key">加载中…</span></div>
                </div>
            </div>
        </div>

    </div><!-- /top summary -->

    <!-- MAIN ROW: Positions sidebar + Workspace -->
    <div class="main-layout">

        <!-- Positions Sidebar -->
        <div class="card-panel" style="position:sticky;top:68px;">
            <div class="panel-header">
                <span class="panel-title">仓位列表</span>
                <button class="btn-icon" hx-get="/ui/panels/positions" hx-target="#pos-list" hx-swap="innerHTML"
                    title="刷新仓位">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div id="pos-list" hx-get="/ui/panels/positions" hx-trigger="load" hx-swap="innerHTML">
                <div class="empty-state"><i class="bi bi-arrow-repeat"></i>
                    <p>加载中…</p>
                </div>
            </div>
        </div>

        <!-- Workspace -->
        <div class="card-panel" style="min-width:0;">

            <!-- Workspace Header + Task Board (rendered together as partial for live counts) -->
            <div id="task-board-wrap" data-token-id="" style="position:relative">
                <div class="workspace-header">
                    <div class="filter-tabs">
                        <span class="panel-title me-2">工作区</span>
                    </div>
                </div>
                <div class="board-section" style="padding-top:48px;padding-bottom:48px">
                    <div class="empty-state" style="width:100%">
                        <i class="bi bi-arrow-left-circle" style="font-size:28px"></i>
                        <p style="font-size:13px;font-weight:600;margin:4px 0 0">请先在左侧选择一个仓位</p>
                        <p style="font-size:11px;color:var(--text-muted);margin:2px 0 0">选中仓位后展示相关任务</p>
                    </div>
                </div>
            </div>

            <!-- Task Detail (populated on card click) -->
            <div id="task-detail"></div>

        </div><!-- /workspace -->
    </div><!-- /main-layout -->
</div><!-- /page-wrap -->
{% endblock %}
